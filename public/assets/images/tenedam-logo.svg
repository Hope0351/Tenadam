<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Medical Cross Icon -->
  <rect x="4" y="8" width="44" height="44" rx="12" fill="url(#iconGrad)"/>
  <rect x="19" y="16" width="14" height="28" rx="3" fill="white" opacity="0.95"/>
  <rect x="12" y="23" width="28" height="14" rx="3" fill="white" opacity="0.95"/>
  <!-- Heartbeat line on the cross -->
  <polyline points="10,30 18,30 22,22 26,38 30,26 34,30 42,30" 
            stroke="white" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand Name -->
  <text x="60" y="42" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="32" font-weight="700" fill="url(#logoGrad)" letter-spacing="-0.5">
    Tenedam
  </text>
  <!-- Tagline -->
  <text x="62" y="54" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="9" fill="#6B7280" letter-spacing="2.5" font-weight="500">
    HEALTH MANAGEMENT SYSTEM
  </text>
</svg>