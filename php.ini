[PHP]
extension_dir = "/home/z/.local/php/usr/lib/php/20240924"

; Load mysqlnd first, then PDO (skip broken pdo_mysql)
extension=mysqlnd.so
; extension=pdo_mysql.so  ; broken - symbol mismatch
extension=mysqli.so
extension=pdo.so
extension=pdo_sqlite.so
extension=sqlite3.so
extension=mbstring.so
extension=xml.so
extension=dom.so
extension=simplexml.so
extension=xmlreader.so
extension=xmlwriter.so
extension=xsl.so
extension=curl.so
extension=zip.so
extension=gd.so
extension=intl.so
extension=bcmath.so
extension=readline.so
extension=tokenizer.so
extension=fileinfo.so
extension=ctype.so
extension=iconv.so
extension=sockets.so
extension=posix.so
extension=phar.so
extension=exif.so
extension=gettext.so
extension=calendar.so
extension=ftp.so
extension=ffi.so
extension=shmop.so
extension=sysvsem.so
extension=sysvshm.so
extension=sysvmsg.so
extension=igbinary.so
extension=redis.so

zend_extension=/home/z/.local/php/usr/lib/php/20240924/opcache.so
opcache.enable=1
opcache.enable_cli=1

memory_limit = 512M
max_execution_time = 300
upload_max_filesize = 100M
post_max_size = 100M
date.timezone = UTC
session.save_handler = files
session.save_path = "/tmp"

error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED
display_errors = Off
display_startup_errors = Off
log_errors = On
